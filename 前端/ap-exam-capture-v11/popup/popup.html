<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AP Exam Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 15px;
      background: #fff;
    }
    h2 {
      font-size: 16px;
      color: #333;
      margin-bottom: 15px;
      text-align: center;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 13px;
    }
    .status.inactive {
      background: #f5f5f5;
      color: #666;
    }
    .status.active {
      background: #d4edda;
      color: #155724;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn.start {
      background: #28a745;
      color: white;
    }
    .btn.start:hover {
      background: #218838;
    }
    .btn.stop {
      background: #dc3545;
      color: white;
    }
    .btn.stop:hover {
      background: #c82333;
    }
    .btn.export {
      background: #007bff;
      color: white;
    }
    .btn.export:hover {
      background: #0056b3;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .info {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>📸 AP Exam Capture</h2>
  
  <div id="status" class="status inactive">
    状态：未采集
  </div>
  
  <button id="startBtn" class="btn start">▶ 开始采集</button>
  <button id="stopBtn" class="btn stop" disabled>⏹ 停止采集</button>
  <button id="exportBtn" class="btn export" disabled>📦 导出数据</button>
  
  <div class="info" id="info">
    在目标页面点击开始
  </div>

  <script src="popup.js"></script>
</body>
</html>
